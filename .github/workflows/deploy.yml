name: Sovereign Stack Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'aws/**'
      - 'main.tf'

# Ensure only one deploy runs at a time to prevent state locking issues
concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Setting env at the job level avoids repeating it for every step
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ensure Backend Bucket Exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Create bucket if it doesn't exist, ignore error if it does
          aws s3api create-bucket \
            --bucket green-logistics-optimizer-state-storage-edelic \
            --region eu-central-1 \
            --create-bucket-configuration LocationConstraint=eu-central-1 || true
          
          # Enable versioning for state safety
          aws s3api put-bucket-versioning \
            --bucket green-logistics-optimizer-state-storage-edelic \
            --versioning-configuration Status=Enabled || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -reconfigure